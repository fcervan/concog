services:

  mysql:
    image: mysql:8.3.0
    container_name: mysql-concog
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: concog
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio
    ports:
      - "9009:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: api-concog
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      ENV: local
      PYTHONPATH: /app/backend
      REDIS_URL: redis://redis:6379
      LOKI_URL: http://loki:3100/loki/api/v1/push
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
      DB_HOST: mysql-concog
      DB_PORT: 3306
      DB_NAME: concog
      DB_USER: root
      DB_PASSWORD: 123456
    volumes:
      - .:/app
    depends_on:
      - redis
      - minio
      - mysql
      - loki

  worker_splitar:
    build: .
    container_name: worker-splitar-concog
    command: rq worker cc-splitar-lancamento --url redis://redis:6379
    volumes:
      - .:/app
    environment:
      ENV: local
      PYTHONPATH: /app/backend
      REDIS_URL: redis://redis:6379
      LOKI_URL: http://loki:3100/loki/api/v1/push
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
      DB_HOST: mysql-concog
      DB_PORT: 3306
      DB_NAME: concog
      DB_USER: root
      DB_PASSWORD: 123456
    depends_on:
      - redis
      - mysql
      - loki

  worker_processar:
    build: .
    container_name: worker-processar-concog
    command: rq worker cc-processar-lancamento --url redis://redis:6379
    volumes:
      - .:/app
    environment:
      ENV: local
      PYTHONPATH: /app/backend
      REDIS_URL: redis://redis:6379
      LOKI_URL: http://loki:3100/loki/api/v1/push
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
      DB_HOST: mysql-concog
      DB_PORT: 3306
      DB_NAME: concog
      DB_USER: root
      DB_PASSWORD: 123456
    depends_on:
      - redis
      - mysql
      - loki

  loki:
    image: grafana/loki:3.0.0
    container_name: loki-concog
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana-concog
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki

  alloy:
    image: grafana/alloy:latest
    container_name: alloy-concog
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    depends_on:
      - loki

networks:
  default:
    name: concog_default
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24

volumes:
  mysql_data:
  minio_data:
  loki_data:
  grafana_data:
