services:

  mysql:
    image: mysql:8.3.0
    container_name: mysql-concog
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: concog
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio
    ports:
      - "9009:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  cc_splitar_lancamento:
    build: .
    command: uvicorn backend.app.entrypoints.webhook:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      ENV: local
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: admin
      DB_HOST: mysql-concog
      DB_PORT: 3306
      DB_NAME: concog
      DB_USER: root
      DB_PASSWORD: 123456
    depends_on:
      - redis
      - minio
      - mysql

  cc_processar_lancamento:
    build: .
    command: rq worker cc-processar-lancamento --url redis://redis:6379
    environment:
      ENV: local
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
      DB_HOST: mysql-concog
      DB_PORT: 3306
      DB_NAME: concog
      DB_USER: root
      DB_PASSWORD: 123456
    depends_on:
      - redis
      - mysql

networks:
  default:
    name: concog_default
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24

volumes:
  mysql_data:
  minio_data: