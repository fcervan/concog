services:
  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    environment:
      - DEBUG=${DEBUG:-0}
      - SERVICES=sqs,lambda,s3,logs
      - LOCALSTACK_AUTH_TOKEN=ls-NIdadUZO-saCA-BAqA-7459-4151hIWefe30
      - LAMBDA_DOCKER_NETWORK=concog-network   # 🔥 ESSENCIAL
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - concog-network   # 🔥 ESSENCIAL

networks:
  concog-network:
    external: true