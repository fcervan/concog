<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ConciliaContábil</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 24px;
    }
    .auth-card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .auth-logo svg {
      width: 40px;
      height: 40px;
      color: var(--primary);
    }
    .auth-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .auth-form .form-group {
      margin-bottom: 20px;
    }
    .auth-form .form-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }
    .auth-form .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      transition: var(--transition);
    }
    .auth-form .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .auth-form .btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      margin-top: 8px;
    }
    .auth-links {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .auth-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-divider span {
      padding: 0 16px;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        <span>ConciliaContábil</span>
      </div>

      <h1 class="auth-title">Bem-vindo de volta</h1>
      <p class="auth-subtitle">Entre com sua conta para acessar o sistema</p>

      <div id="alerts-container"></div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Login</label>
          <input type="text" id="email" class="form-input" placeholder="fcervan" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input type="password" id="senha" class="form-input" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" id="btnLogin">
          Entrar
        </button>
      </form>

      <div class="auth-divider">
        <span>ou</span>
      </div>

      <div class="auth-links">
        <a href="forgot-password.html">Esqueceu sua senha?</a>
      </div>

      <div class="auth-links" style="margin-top: 16px;">
        Ainda não tem conta? <a href="register.html">Cadastre-se</a>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/ui.js"></script>
  <script>
    // Redirecionar se já estiver logado
    if (auth.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('btnLogin');
      const restoreBtn = ui.showLoading(btn, 'Entrando...');

      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      const result = await auth.login(email, senha);

      restoreBtn();

      if (result.success) {
        ui.showSuccess('Login realizado com sucesso!');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        ui.showError(result.error || 'Erro ao fazer login');
      }
    });
  </script>
</body>
</html>
