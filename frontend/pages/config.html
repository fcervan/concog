<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuração - ConCog - Contabilidade Cognitiva</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 24px;
    }
    .auth-card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 520px;
      padding: 40px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .auth-logo svg {
      width: 40px;
      height: 40px;
      color: var(--primary);
    }
    .auth-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .auth-form .form-group {
      margin-bottom: 20px;
    }
    .auth-form .form-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }
    .auth-form .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      transition: var(--transition);
      background: var(--bg-primary);
    }
    .auth-form .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .auth-form .btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      margin-top: 8px;
    }
    .parser-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }
    .parser-option:hover {
      border-color: var(--primary);
      background: rgba(37, 99, 235, 0.05);
    }
    .parser-option.selected {
      border-color: var(--primary);
      background: rgba(37, 99, 235, 0.1);
    }
    .parser-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .parser-radio {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
      position: relative;
      transition: all 0.2s ease;
    }
    .parser-option.selected .parser-radio {
      border-color: var(--primary);
    }
    .parser-option.selected .parser-radio::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
    }
    .parser-content {
      flex: 1;
    }
    .parser-name {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      font-size: 1rem;
    }
    .parser-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>ConCog - Contabilidade Cognitiva</span>
      </div>

      <h1 class="auth-title">Configuração Inicial</h1>
      <p class="auth-subtitle">Selecione o formato da planilha que você vai usar para conciliação</p>

      <div id="alerts-container"></div>

      <form class="auth-form" id="configForm">
        <div class="form-group">
          <label class="form-label" for="nomeFantasia">Nome Fantasia</label>
          <input type="text" id="nomeFantasia" class="form-input" placeholder="Nome da empresa" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="cnpj">CNPJ</label>
          <input type="text" id="cnpj" class="form-input" placeholder="00000000000000" maxlength="14" required>
        </div>

        <div class="form-group">
          <label class="form-label">Formato da Planilha</label>
          <div id="parsers-list"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="btnSave" disabled>
          Salvar e Continuar
        </button>
      </form>
    </div>
  </div>

  <script src="../js/config.js?v=6"></script>
  <script src="../js/api.js?v=6"></script>
  <script src="../js/auth.js?v=6"></script>
  <script src="../js/ui.js?v=6"></script>
  <script>
    if (!auth.isAuthenticated()) {
      window.location.href = 'login.html';
    }

    let selectedParserId = null;
    let userSession = JSON.parse(localStorage.getItem('cc_user') || '{}');

    function validateForm() {
      const nome = document.getElementById('nomeFantasia').value.trim();
      const cnpj = document.getElementById('cnpj').value.trim();
      document.getElementById('btnSave').disabled = !(nome && cnpj && selectedParserId);
    }

    document.getElementById('nomeFantasia').addEventListener('input', validateForm);
    document.getElementById('cnpj').addEventListener('input', validateForm);

    async function loadParsers() {
      try {
        const data = await api.get(CONFIG.ENDPOINTS.PARSERS_DISPONIVEIS, false);
        const container = document.getElementById('parsers-list');
        container.innerHTML = data.parsers.map(p => `
          <div class="parser-option" onclick="selectParser(${p.arquivo_parser_id}, this)">
            <input type="radio" name="parser" value="${p.arquivo_parser_id}">
            <div class="parser-radio"></div>
            <div class="parser-content">
              <div class="parser-name">${p.nome_parser}</div>
              <div class="parser-desc">${p.descricao_arquivo_parser}</div>
            </div>
          </div>
        `).join('');
      } catch (error) {
        ui.showError('Erro ao carregar parsers: ' + error.message);
      }
    }

    function selectParser(id, element) {
      document.querySelectorAll('.parser-option').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      selectedParserId = id;
      validateForm();
    }

    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('btnSave');
      const restoreBtn = ui.showLoading(btn, 'Salvando...');

      const nomeFantasia = document.getElementById('nomeFantasia').value.trim();
      const cnpj = document.getElementById('cnpj').value.trim();
      const usuario = JSON.parse(localStorage.getItem('cc_user') || '{}');

      try {
        const result = await api.post(CONFIG.ENDPOINTS.CONFIGURAR_PARSER, {
          nome_fantasia: nomeFantasia,
          cnpj: cnpj,
          arquivo_parser_id: selectedParserId,
          usuario_id: usuario.id
        }, false);

        restoreBtn();

        if (result.sessao) {
          localStorage.setItem('cc_sessao', JSON.stringify(result.sessao));
        }

        ui.showSuccess('Configuração salva com sucesso!');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } catch (error) {
        restoreBtn();
        ui.showError(error.message || 'Erro ao salvar configuração');
      }
    });

    loadParsers();
  </script>
</body>
</html>
