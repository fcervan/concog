<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - ConCog - Contabilidade Cognitiva</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 24px;
    }
    .auth-card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .auth-logo svg {
      width: 40px;
      height: 40px;
      color: var(--primary);
    }
    .auth-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .auth-form .form-group {
      margin-bottom: 20px;
    }
    .auth-form .form-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      display: block;
    }
    .auth-form .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      transition: var(--transition);
    }
    .auth-form .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .auth-form .btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      margin-top: 8px;
    }
    .auth-links {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .auth-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
        </svg>
        <span>ConCog - Contabilidade Cognitiva</span>
      </div>

      <h1 class="auth-title">Criar conta</h1>
      <p class="auth-subtitle">Comece a conciliar seus lançamentos hoje mesmo</p>

      <div id="alerts-container"></div>

      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label class="form-label" for="nome">Nome completo</label>
          <input type="text" id="nome" class="form-input" placeholder="João Silva" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="senha">Senha</label>
          <input type="password" id="senha" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmarSenha">Confirmar senha</label>
          <input type="password" id="confirmarSenha" class="form-input" placeholder="Repita a senha" required>
        </div>

        <button type="submit" class="btn btn-primary" id="btnRegister">
          Criar conta
        </button>
      </form>

      <div class="auth-links" style="margin-top: 24px;">
        Já tem conta? <a href="login.html">Entrar</a>
      </div>
    </div>
  </div>

  <script src="../js/config.js?v=3"></script>
  <script src="../js/api.js?v=3"></script>
  <script src="../js/auth.js?v=3"></script>
  <script src="../js/ui.js?v=3"></script>
  <script>
    // Redirecionar se já estiver logado
    if (auth.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn = document.getElementById('btnRegister');
      const restoreBtn = ui.showLoading(btn, 'Criando conta...');

      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const confirmarSenha = document.getElementById('confirmarSenha').value;

      if (senha !== confirmarSenha) {
        restoreBtn();
        ui.showError('As senhas não coincidem');
        return;
      }

      const result = await auth.register(nome, email, senha, confirmarSenha);

      restoreBtn();

      if (result.success) {
        ui.showSuccess('Conta criada com sucesso!');
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        ui.showError(result.error || 'Erro ao criar conta');
      }
    });
  </script>
</body>
</html>
